version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-type: "dev-dependencies"
        # Keep dev updates less noisy — still allowed but deprioritized
        # Remove or modify if you want Dependabot to update dev deps too

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
