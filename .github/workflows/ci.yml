name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        env:
          NODE_ENV: production
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run unit tests
        run: npm run test

  a11y:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start server
        # Start server in background; `npm run start` will run `next start`
        run: |
          nohup npm run start &
          echo "Waiting for server to boot..."
          sleep 8
      - name: Run accessibility checks (axe + Playwright)
        run: npm run test:a11y
